# Stage config for MiniCPM-o 4.5 with 3-stage architecture
# Verified on: 2x H100-80G (pattern from qwen2_5_omni.yaml)
# For RTX 3090 x2: NCCL_P2P_DISABLE=1 required

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0"
      max_batch_size: 64
    engine_args:
      model_stage: thinker
      model_arch: MiniCPMOForConditionalGeneration
      max_num_seqs: 64
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.9
      enforce_eager: false
      trust_remote_code: true
      engine_output_type: latent
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      limit_mm_per_prompt: {video: 0}
      tensor_parallel_size: 1
    final_output: true
    final_output_type: text
    is_comprehension: true
    preserve_multimodal: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.05

  - stage_id: 1
    stage_type: llm
    runtime:
      process: true
      devices: "1"
      max_batch_size: 64
    engine_args:
      model_stage: talker
      model_arch: MiniCPMOForConditionalGeneration
      max_num_seqs: 64
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      hf_config_name: tts_config
      gpu_memory_utilization: 0.6
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      distributed_executor_backend: "mp"
      tensor_parallel_size: 1
      limit_mm_per_prompt: {image: 0, video: 0, audio: 0}
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.thinker2talker
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      detokenize: false
      repetition_penalty: 1.05
      stop_token_ids: [6561]

  - stage_id: 2
    stage_type: llm
    runtime:
      process: true
      devices: "1"
      max_batch_size: 32
    engine_args:
      model_stage: code2wav
      model_arch: MiniCPMOForConditionalGeneration
      max_num_seqs: 32
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.1
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 1000000
      tensor_parallel_size: 1
      limit_mm_per_prompt: {image: 0, video: 0, audio: 0}
    engine_input_source: [1]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.talker2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true
      repetition_penalty: 1.1

# Sequential execution — prevents OOM from concurrent stage memory usage
runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1
  edges:
    - from: 0
      to: 1
      window_size: -1
    - from: 1
      to: 2
      window_size: -1
