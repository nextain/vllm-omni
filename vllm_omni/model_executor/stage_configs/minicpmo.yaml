# Stage config for running MiniCPM-o 4.5 with 3-stage architecture
# Stage 0: Thinker (SigLIP2 + Whisper + Qwen3-7B -> text + hidden states)
# Stage 1: Talker (MiniCPMTTS Llama AR -> audio codec tokens, num_vq=1)
# Stage 2: Code2Wav (CosyVoice2 flow + HiFi-GAN -> audio waveform)
#
# Single GPU config: all 3 stages on device "0"
# Thinker BF16 ~14GB + Talker ~1GB + Code2Wav ~0.5GB = ~15.5GB
# Requires >=24GB GPU (RTX 3090, A5000, A6000, etc.)

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: thinker
      model_arch: MiniCPMOForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.80
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 4096
      max_model_len: 4096
      max_num_seqs: 4
      limit_mm_per_prompt: {video: 0}
      tensor_parallel_size: 1
    final_output: true
    final_output_type: text
    is_comprehension: true
    preserve_multimodal: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 256
      seed: 42
      detokenize: true
      repetition_penalty: 1.05

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: talker
      model_arch: MiniCPMOForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.07
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 2048
      max_model_len: 2048
      max_num_seqs: 2
      distributed_executor_backend: "mp"
      limit_mm_per_prompt: {image: 0, video: 0}
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.thinker2talker
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 2048
      seed: 42
      detokenize: false
      repetition_penalty: 1.05
      stop_token_ids: [6561]

  - stage_id: 2
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: code2wav
      model_arch: MiniCPMOForConditionalGeneration
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.02
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 1000
      max_num_seqs: 1
      limit_mm_per_prompt: {image: 0, video: 0}
    engine_input_source: [1]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.talker2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 5000
      seed: 42
      detokenize: true
      repetition_penalty: 1.1
