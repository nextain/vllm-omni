# MiniCPM-o 4.5 — single GPU <=24GB reference config (e.g. RTX 3090)
# All 3 stages on device "0". Memory-constrained: enforce_eager=true,
# reduced max_model_len, tight gpu_memory_utilization split.
# For larger GPUs (48GB+), use minicpmo.yaml instead.

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: thinker
      model_arch: MiniCPMOForConditionalGeneration
      max_num_seqs: 2
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.75
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 1600
      max_model_len: 1600
      limit_mm_per_prompt: {video: 0}
      tensor_parallel_size: 1
    final_output: true
    final_output_type: text
    is_comprehension: true
    preserve_multimodal: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 256
      seed: 42
      detokenize: true
      repetition_penalty: 1.05

  - stage_id: 1
    stage_type: llm
    runtime:
      process: true
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: talker
      model_arch: MiniCPMOForConditionalGeneration
      max_num_seqs: 2
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      hf_config_name: tts_config
      gpu_memory_utilization: 0.07
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 1600
      max_model_len: 1600
      distributed_executor_backend: "mp"
      tensor_parallel_size: 1
      limit_mm_per_prompt: {image: 0, video: 0, audio: 0}
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.thinker2talker
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 2048
      seed: 42
      detokenize: false
      repetition_penalty: 1.05
      stop_token_ids: [6561]

  - stage_id: 2
    stage_type: llm
    runtime:
      process: true
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: code2wav
      model_arch: MiniCPMOForConditionalGeneration
      max_num_seqs: 1
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.02
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 1000
      tensor_parallel_size: 1
      limit_mm_per_prompt: {image: 0, video: 0, audio: 0}
    engine_input_source: [1]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.talker2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 5000
      seed: 42
      detokenize: true
      repetition_penalty: 1.1

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1
  edges:
    - from: 0
      to: 1
      window_size: -1
    - from: 1
      to: 2
      window_size: -1
