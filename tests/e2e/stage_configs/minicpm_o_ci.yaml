# Stage config for MiniCPM-o 4.5 with 3-stage architecture
# Stage 0: Thinker (SigLIP2 + Whisper + Qwen3-7B)
# Stage 1: Talker (MiniCPMTTS Llama AR, num_vq=1)
# Stage 2: Code2Wav (CosyVoice2 DiT + HiFi-GAN)
#
# Tested on RTX 3090 (24GB).  Thinker (BF16) ≈ 16GB, Talker ≈ 1GB.

stage_args:
- stage_id: 0
  runtime:
    devices: "0"
    max_batch_size: 1
  engine_args:
    model_stage: thinker
    model_arch: MiniCPMOForConditionalGeneration
    worker_type: ar
    scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
    gpu_memory_utilization: 0.75
    enforce_eager: true
    trust_remote_code: true
    engine_output_type: latent
    distributed_executor_backend: "mp"
    max_num_batched_tokens: 8192
    max_model_len: 8192
    enable_prefix_caching: false
    mm_processor_cache_gb: 0
    load_format: dummy
  final_output: true
  final_output_type: text
  is_comprehension: false
  default_sampling_params:
    temperature: 0.7
    top_p: 0.9
    max_tokens: 256
    seed: 42
    ignore_eos: false
    detokenize: true

- stage_id: 1
  runtime:
    devices: "0"
    max_batch_size: 1
  engine_args:
    model_stage: talker
    model_arch: MiniCPMOForConditionalGeneration
    worker_type: ar
    scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
    gpu_memory_utilization: 0.1
    enforce_eager: true
    trust_remote_code: true
    engine_output_type: latent
    enable_prefix_caching: false
    max_num_batched_tokens: 8192
    max_model_len: 8192
    distributed_executor_backend: "mp"
    load_format: dummy
  engine_input_source: [0]
  custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.thinker2talker
  default_sampling_params:
    temperature: 0.9
    top_k: 50
    max_tokens: 2048
    seed: 42
    detokenize: false
    # Talker codec EOS token: num_audio_tokens - 1 = 6562 - 1 = 6561
    stop_token_ids: [6561]

- stage_id: 2
  runtime:
    devices: "0"
    max_batch_size: 1
  engine_args:
    model_stage: code2wav
    model_arch: MiniCPMOForConditionalGeneration
    worker_type: generation
    scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    engine_output_type: audio
    gpu_memory_utilization: 0.05
    distributed_executor_backend: "mp"
    max_num_batched_tokens: 100000
    async_scheduling: false
    load_format: dummy
  engine_input_source: [1]
  custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.talker2code2wav
  final_output: true
  final_output_type: audio
  default_sampling_params:
    temperature: 0.0
    top_k: -1
    max_tokens: 5000
    seed: 42
    detokenize: true
