# Stage config for MiniCPM-o 4.5 CI testing with 3-stage architecture
# Stage 0: Thinker (SigLIP2 + Whisper + Qwen3-7B)
# Stage 1: Talker (MiniCPMTTS Llama AR, num_vq=1)
# Stage 2: Code2Wav (CosyVoice2 DiT + HiFi-GAN)

# The following config has been verified on 2x RTX 3090 GPUs.
stage_args:
- stage_id: 0
  runtime:
    devices: "0"
  engine_args:
    model_stage: thinker
    max_num_seqs: 5
    model_arch: MiniCPMOForConditionalGeneration
    worker_type: ar
    scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
    gpu_memory_utilization: 0.9
    enforce_eager: false
    trust_remote_code: true
    engine_output_type: latent
    distributed_executor_backend: "mp"
    max_num_batched_tokens: 32768
    max_model_len: 32768
    enable_prefix_caching: false
    mm_processor_cache_gb: 0
    tensor_parallel_size: 1
    load_format: dummy
    limit_mm_per_prompt: {video: 0}
  final_output: true
  final_output_type: text
  is_comprehension: true
  preserve_multimodal: true
  default_sampling_params:
    temperature: 0.4
    top_p: 0.9
    top_k: 1
    max_tokens: 100
    seed: 42
    ignore_eos: false
    detokenize: true
    repetition_penalty: 1.05

- stage_id: 1
  runtime:
    devices: "1"
  engine_args:
    model_stage: talker
    max_num_seqs: 5
    model_arch: MiniCPMOForConditionalGeneration
    worker_type: ar
    scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
    gpu_memory_utilization: 0.5
    enforce_eager: true
    trust_remote_code: true
    engine_output_type: latent
    enable_prefix_caching: false
    max_num_batched_tokens: 32768
    max_model_len: 32768
    distributed_executor_backend: "mp"
    load_format: dummy
  engine_input_source: [0]
  custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.thinker2talker
  default_sampling_params:
    temperature: 0.9
    top_k: 50
    max_tokens: 1000
    seed: 42
    detokenize: false
    repetition_penalty: 1.05
    stop_token_ids: [6561]

- stage_id: 2
  runtime:
    devices: "1"
  engine_args:
    model_stage: code2wav
    max_num_seqs: 1
    model_arch: MiniCPMOForConditionalGeneration
    worker_type: generation
    scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    engine_output_type: audio
    gpu_memory_utilization: 0.1
    distributed_executor_backend: "mp"
    max_num_batched_tokens: 1000000
    async_scheduling: false
    load_format: dummy
  engine_input_source: [1]
  custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpm_o.talker2code2wav
  final_output: true
  final_output_type: audio
  default_sampling_params:
    temperature: 0.0
    top_p: 1.0
    top_k: -1
    max_tokens: 2000
    seed: 42
    detokenize: true
    repetition_penalty: 1.1
